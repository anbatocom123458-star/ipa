name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache XcodeGen
        uses: actions/cache@v4
        with:
          path: /opt/homebrew/Cellar/xcodegen
          key: xcodegen-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: xcodegen-${{ runner.os }}-

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already cached"
          fi
          xcodegen version

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive (Unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BatteryManager.xcodeproj \
            -scheme BatteryManager \
            -archivePath $RUNNER_TEMP/BatteryManager.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            | tee $RUNNER_TEMP/build.log | xcpretty --color || true

      - name: Package IPA
        run: |
          ARCHIVE_APP="$RUNNER_TEMP/BatteryManager.xcarchive/Products/Applications/BatteryManager.app"
          
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "ERROR: App not found at $ARCHIVE_APP"
            echo "Searching for any .app in archive..."
            find $RUNNER_TEMP/BatteryManager.xcarchive -name "*.app" -type d
            exit 1
          fi
          
          echo "Found app: $ARCHIVE_APP"
          echo "App size: $(du -sh $ARCHIVE_APP | cut -f1)"
          
          mkdir -p $RUNNER_TEMP/Payload
          cp -R "$ARCHIVE_APP" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -qr BatteryManager.ipa Payload
          
          IPA_SIZE=$(stat -f%z BatteryManager.ipa 2>/dev/null || stat -c%s BatteryManager.ipa)
          echo "IPA size: $IPA_SIZE bytes"

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BatteryManager-IPA
          path: ${{ runner.temp }}/BatteryManager.ipa
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/BatteryManager.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "========== BUILD ERRORS =========="
          if [ -f $RUNNER_TEMP/build.log ]; then
            grep -i "error:" $RUNNER_TEMP/build.log | head -40 || true
            echo ""
            echo "========== LAST 80 LINES =========="
            tail -n 80 $RUNNER_TEMP/build.log
          else
            echo "No build log found"
          fi
