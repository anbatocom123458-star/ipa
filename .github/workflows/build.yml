name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "=== BatteryWebhook folder ==="
          ls -la BatteryWebhook/ || echo "BatteryWebhook folder not found!"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./BatteryWebhook
        run: |
          # Tạo package-lock.json nếu chưa có
          if [ ! -f "package-lock.json" ]; then
            echo "⚠️ package-lock.json not found, generating..."
            npm install --legacy-peer-deps
          else
            npm ci --legacy-peer-deps
          fi

      - name: Install Expo CLI
        working-directory: ./BatteryWebhook
        run: npm install -g expo-cli

      - name: Prebuild iOS native project
        working-directory: ./BatteryWebhook
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS App (unsigned)
        working-directory: ./BatteryWebhook
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        working-directory: ./BatteryWebhook
        run: |
          mkdir -p Payload
          # Tìm app file
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n 1)
          echo "App path: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r output.ipa Payload/
            echo "✅ IPA created successfully!"
          else
            echo "❌ No .app file found!"
            find ios/build -type d | head -20
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: BatteryWebhook/output.ipa
          retention-days: 3
