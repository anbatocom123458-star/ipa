name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Check structure
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -d "BatteryWebhook" ]; then
            echo "=== BatteryWebhook folder ==="
            ls -la BatteryWebhook/
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (with legacy-peer-deps)
        working-directory: ./BatteryWebhook
        run: |
          # Xóa lock file cũ nếu có vấn đề
          rm -f package-lock.json
          # Cài lại từ đầu
          npm install --legacy-peer-deps
          # Tạo lock file mới
          npm install --package-lock-only --legacy-peer-deps

      - name: Install Expo CLI
        working-directory: ./BatteryWebhook
        run: npm install -g expo-cli

      - name: Prebuild iOS native project
        working-directory: ./BatteryWebhook
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS App (unsigned)
        working-directory: ./BatteryWebhook
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        working-directory: ./BatteryWebhook
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n 1)
          echo "App path: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r output.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -la output.ipa
          else
            echo "❌ No .app file found!"
            find ios/build -type d | head -20
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: BatteryWebhook/output.ipa
          retention-days: 3
