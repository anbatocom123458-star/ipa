name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./BatteryWebhook
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        working-directory: ./BatteryWebhook
        run: npm install -g expo-cli

      - name: Prebuild iOS native project
        working-directory: ./BatteryWebhook
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS App (unsigned) - WITH FULL LOGS
        working-directory: ./BatteryWebhook
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "🔍 Workspace: $WORKSPACE"
          echo "🔍 Scheme: $SCHEME"
          echo "🔍 Current directory: $(pwd)"
          echo "🔍 Files in ios:"
          ls -la
          
          # Build với log chi tiết
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log
          
          # Kiểm tra kết quả build
          if [ $? -eq 0 ]; then
            echo "✅ Build thành công!"
          else
            echo "❌ Build thất bại. Log cuối:"
            tail -100 build.log
            exit 1
          fi

      - name: Find and Package IPA
        working-directory: ./BatteryWebhook
        run: |
          echo "🔍 Tìm .app file..."
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n 1)
          echo "APP_PATH: $APP_PATH"
          
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r output.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -la output.ipa
          else
            echo "❌ Không tìm thấy .app file!"
            echo "🔍 Tìm kiếm trong ios/build:"
            find ios/build -type d | head -30
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: BatteryWebhook/output.ipa
          retention-days: 3
