name: Build IPA on macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS App (unsigned)
        run: |
          cd ios
          xcodebuild -workspace batterywebhook.xcworkspace \
            -scheme batterywebhook \
            -configuration Release \
            -derivedDataPath build \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p output
          cp -r "ios/build/Build/Products/Release-iphoneos/batterywebhook.app" output/
          cd output
          zip -r BatteryMonitor.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatteryMonitor-IPA
          path: output/BatteryMonitor.ipa
