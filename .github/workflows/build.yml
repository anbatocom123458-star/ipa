name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QUAN TRỌNG: Chuyển vào thư mục chứa mã nguồn của bạn
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./baopin_fixed  # <--- Thêm dòng này để trỏ đúng thư mục
        run: flutter pub get

      - name: Build iOS App
        working-directory: ./baopin_fixed  # <--- Thêm dòng này
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Trỏ đúng đường dẫn tới thư mục build bên trong thư mục dự án
          mv baopin_fixed/build/ios/iphoneos/Runner.app Payload/
          zip -r output.ipa Payload/
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: output.ipa
          retention-days: 3
