name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BatteryWebhook/package-lock.json

      - name: Install dependencies
        working-directory: ./BatteryWebhook
        run: npm ci

      - name: Prebuild iOS native project
        working-directory: ./BatteryWebhook
        run: npx expo prebuild --platform ios

      - name: Build iOS App (unsigned)
        working-directory: ./BatteryWebhook/ios
        run: |
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive -archivePath build/App.xcarchive

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r BatteryWebhook/ios/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -r output.ipa Payload/
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: output.ipa
          retention-days: 3
