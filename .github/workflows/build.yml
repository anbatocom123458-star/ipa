name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Unsigned IPA
        run: |
          xcodebuild build \
            -project BatteryManager.xcodeproj \
            -scheme BatteryManager \
            -destination 'generic/platform=iOS' \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=""

          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "BatteryManager.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"

          mkdir -p $RUNNER_TEMP/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r BatteryManager.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BatteryManager-IPA
          path: ${{ runner.temp }}/BatteryManager.ipa
