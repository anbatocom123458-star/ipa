name: BatteryManager
targets:
  BatteryManager:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - BatteryManager
    dependencies:
      - sdk: IOKit.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.batterymanager
        INFOPLIST_FILE: BatteryManager/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: BatteryManager/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        UIBackgroundModes:
          - fetch
