name: BatteryManager
targets:
  BatteryManager:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - BatteryManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.batterymanager
        INFOPLIST_FILE: BatteryManager/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: YOUR_TEAM_ID
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: BatteryManager/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIUserInterfaceStyle: Dark
        UIBackgroundModes:
          - fetch
        NSLocalNotificationUsageDescription: "Ứng dụng cần gửi thông báo về tình trạng pin"
